[package]
name = "ctrl-sys-widgets"
version = "0.2.0"
edition = "2021"

[[bin]]
name = "ctrl-demo-server"
path = "src/main.rs"

[dependencies]
# Web framework
axum = "0.7"
tokio = { version = "1", features = ["full"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["fs", "trace", "cors"] }

# HTML templating
maud = { version = "0.25", features = ["axum"] }

# Data handling
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Concurrent caching
dashmap = "6"

# Async streams (for SSE)
tokio-stream = "0.1"
futures = "0.3"
async-stream = "0.3"

# Time handling
chrono = "0.4"

# EPICS
# pvxs-sys = { path = "../pvxs-sys" }
pvxs-sys = "0.1"

[profile.release]
opt-level = "z"
lto = true
