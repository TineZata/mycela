<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control System Widgets - UI Kit Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --alarm-normal-colour: #00cc66;
            --alarm-minor-colour: #ffa500;
            --alarm-major-colour: #ff4444;
            --alarm-invalid-colour: #ff00ff;
            --alarm-not-connected-colour: #fa00fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
            background: #1e1e1e;
        }

        #app {
            width: 100vw;
            height: 100vh;
        }

        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #1e1e1e;
            color: #fff;
            font-size: 18px;
        }

        .loader {
            border: 4px solid #333;
            border-top: 4px solid #0066cc;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-right: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader"></div>
        <span>Loading Control System Widgets Gallery...</span>
    </div>
    <div id="app"></div>

    <script type="module">
        import init, { init_app } from './pkg/ctrl_sys_widgets.js';

        async function run() {
            try {
                // Initialize the WASM module
                await init();
                
                // Hide loading screen
                document.getElementById('loading').style.display = 'none';
                
                // Initialize the application
                init_app();
                
                console.log('Application loaded successfully');
            } catch (error) {
                console.error('Failed to load application:', error);
                document.getElementById('loading').innerHTML = `
                    <div style="text-align: center;">
                        <div style="color: #ff4444; font-size: 24px; margin-bottom: 20px;">❌ Failed to load application</div>
                        <div style="color: #aaa;">${error.message}</div>
                        <div style="color: #666; margin-top: 20px; font-size: 14px;">
                            Make sure you've built the WASM module with:<br>
                            <code style="background: #333; padding: 5px 10px; border-radius: 3px; display: inline-block; margin-top: 10px;">
                                wasm-pack build --target web
                            </code>
                        </div>
                    </div>
                `;
            }
        }

        run();
    </script>
</body>
</html>
