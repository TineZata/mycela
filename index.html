<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control System Widgets - EPICS gRPC-Web Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            min-height: 100vh;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 18px;
            color: #888;
        }

        /* Widget styling */
        .text-entry-widget {
            position: relative;
        }

        .pv-input:focus {
            outline: 2px solid #1e90ff;
            outline-offset: 2px;
        }

        .gauge-widget {
            transition: all 0.3s ease;
        }

        .gauge-widget:hover {
            transform: translateY(-2px);
        }

        .led-widget {
            transition: all 0.2s ease;
        }

        .pv-button {
            transition: all 0.2s ease;
        }

        .pv-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(30, 144, 255, 0.4);
        }

        .pv-button:active {
            transform: translateY(0);
        }

        /* Page layout */
        .page-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .widget-grid {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>
<body>
    <div id="app">
        <div class="loading">Loading WASM module...</div>
    </div>

    <script type="module">
        import init, { init_proto_demo } from './pkg/ctrl_sys_widgets.js';

        async function run() {
            try {
                await init();
                console.log('WASM initialized');
                
                // Initialize the gRPC-Web demo
                if (typeof init_proto_demo === 'function') {
                    init_proto_demo();
                } else {
                    console.error('Proto demo not available - feature may not be enabled');
                    document.getElementById('app').innerHTML = `
                        <div style="padding: 40px; color: #ffa500;">
                            <h2>Proto Feature Not Available</h2>
                            <p>The proto feature may not be enabled. Build with:</p>
                            <pre style="margin-top: 20px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px;">
wasm-pack build --target web --out-dir pkg
                            </pre>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to initialize WASM:', error);
                document.getElementById('app').innerHTML = `
                    <div style="padding: 40px; color: #ff6b6b;">
                        <h2>Error Loading Application</h2>
                        <p>${error.message}</p>
                        <pre style="margin-top: 20px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px; overflow: auto;">
${error.stack}
                        </pre>
                    </div>
                `;
            }
        }

        run();
    </script>
</body>
</html>
