syntax = "proto3";

package epics.pv;

// ============================================================================
// Core PV Data Types
// ============================================================================

message PVValue {
  string name = 1;
  oneof value {
    double double_value = 2;
    int32 int32_value = 3;
    string string_value = 4;
    DoubleArray double_array = 5;
    Int32Array int32_array = 6;
    StringArray string_array = 7;
  }
  PVMetadata metadata = 8;
  int64 timestamp_sec = 9;
  int32 timestamp_nsec = 10;
}

message DoubleArray {
  repeated double values = 1;
}

message Int32Array {
  repeated int32 values = 1;
}

message StringArray {
  repeated string values = 1;
}

// ============================================================================
// PV Metadata
// ============================================================================

message PVMetadata {
  Alarm alarm = 1;
  Display display = 2;
  Control control = 3;
  ValueAlarm value_alarm = 4;
}

message Alarm {
  int32 severity = 1;  // 0=NO_ALARM, 1=MINOR, 2=MAJOR, 3=INVALID
  int32 status = 2;
  string message = 3;
}

message Display {
  double limit_low = 1;
  double limit_high = 2;
  string description = 3;
  string units = 4;
  int32 precision = 5;
}

message Control {
  double limit_low = 1;
  double limit_high = 2;
  double min_step = 3;
}

message ValueAlarm {
  bool active = 1;
  double low_alarm_limit = 2;
  double low_warning_limit = 3;
  double high_warning_limit = 4;
  double high_alarm_limit = 5;
  int32 low_alarm_severity = 6;
  int32 low_warning_severity = 7;
  int32 high_warning_severity = 8;
  int32 high_alarm_severity = 9;
  double hysteresis = 10;
}

// ============================================================================
// Widget Configuration Schema
// ============================================================================

// Base widget configuration that all widgets share
message WidgetConfig {
  string id = 1;                    // Unique widget instance ID
  string pv_name = 2;               // PV to bind to
  WidgetType type = 3;              // Widget type discriminator
  
  // Widget-specific configuration (oneof based on type)
  oneof config {
    TextEntryConfig text_entry = 10;
    GaugeConfig gauge = 11;
    ChartConfig chart = 12;
    ButtonConfig button = 13;
    LEDConfig led = 14;
    SliderConfig slider = 15;
  }
  
  // Common styling
  CommonStyle style = 20;
  
  // Optional label/description
  string label = 30;
  string description = 31;
  
  // Layout hints
  LayoutHints layout = 40;
}

enum WidgetType {
  WIDGET_TYPE_UNSPECIFIED = 0;
  TEXT_ENTRY = 1;
  GAUGE = 2;
  CHART = 3;
  BUTTON = 4;
  LED = 5;
  SLIDER = 6;
}

// ============================================================================
// Text Entry Widget Configuration
// ============================================================================

message TextEntryConfig {
  bool show_units = 1;              // Display units on the right
  bool show_readback = 2;           // Display live readback value
  int32 precision = 3;              // Number of decimal places
  double min_value = 4;             // Optional validation
  double max_value = 5;
  string placeholder = 6;           // Placeholder text
  
  // Visual options
  TextEntryStyle entry_style = 10;
  ReadbackStyle readback_style = 11;
  
  // Behavior
  bool auto_submit = 20;            // Submit on blur (vs Enter only)
  double debounce_ms = 21;          // Debounce for auto-submit
}

message TextEntryStyle {
  string background_color = 1;      // e.g., "#e6f3ff"
  string text_color = 2;
  string border_style = 3;          // e.g., "solid", "dashed"
  int32 font_size = 4;              // in pixels
  string font_family = 5;
}

message ReadbackStyle {
  string background_color = 1;
  string text_color = 2;
  bool show_alarm_border = 3;       // Color border based on alarm
  AlarmVisualization alarm_viz = 4;
}

enum AlarmVisualization {
  ALARM_VIZ_UNSPECIFIED = 0;
  BORDER_ONLY = 1;
  ICON_ONLY = 2;
  ICON_AND_BORDER = 3;
  BACKGROUND_COLOR = 4;
}

// ============================================================================
// Other Widget Configurations
// ============================================================================

message GaugeConfig {
  double min_value = 1;
  double max_value = 2;
  int32 num_ticks = 3;
  bool show_needle = 4;
  bool show_value_text = 5;
  repeated GaugeRange ranges = 6;   // Color zones
}

message GaugeRange {
  double start = 1;
  double end = 2;
  string color = 3;
  string label = 4;
}

message ChartConfig {
  int32 history_length = 1;         // Number of points to keep
  double time_window_sec = 2;       // X-axis time range
  bool auto_scale = 3;
  double y_min = 4;
  double y_max = 5;
  LineStyle line_style = 6;
}

message LineStyle {
  string color = 1;
  int32 width = 2;
  string style = 3;                 // "solid", "dashed", "dotted"
}

message ButtonConfig {
  double put_value = 1;             // Value to PUT on click
  string label = 2;
  ButtonStyle button_style = 3;
  bool confirm_action = 4;          // Show confirmation dialog
}

message ButtonStyle {
  string background_color = 1;
  string text_color = 2;
  string hover_color = 3;
  int32 width = 4;
  int32 height = 5;
}

message LEDConfig {
  repeated LEDState states = 1;     // Map values to colors
  int32 size = 2;                   // Diameter in pixels
  bool show_label = 3;
}

message LEDState {
  double value = 1;
  string color = 2;
  string label = 3;
}

message SliderConfig {
  double min_value = 1;
  double max_value = 2;
  double step = 3;
  bool show_value = 4;
  bool show_ticks = 5;
  SliderOrientation orientation = 6;
}

enum SliderOrientation {
  SLIDER_ORIENTATION_UNSPECIFIED = 0;
  HORIZONTAL = 1;
  VERTICAL = 2;
}

// ============================================================================
// Common Styling
// ============================================================================

message CommonStyle {
  int32 width = 1;                  // In pixels or 0 for auto
  int32 height = 2;
  Padding padding = 3;
  Margin margin = 4;
  string border_radius = 5;         // e.g., "8px"
  string box_shadow = 6;
}

message Padding {
  int32 top = 1;
  int32 right = 2;
  int32 bottom = 3;
  int32 left = 4;
}

message Margin {
  int32 top = 1;
  int32 right = 2;
  int32 bottom = 3;
  int32 left = 4;
}

message LayoutHints {
  int32 grid_column = 1;            // CSS grid column
  int32 grid_row = 2;               // CSS grid row
  int32 grid_column_span = 3;
  int32 grid_row_span = 4;
  string flex_grow = 5;
  string align_self = 6;
}

// ============================================================================
// Page Configuration
// ============================================================================

message PageConfig {
  string id = 1;
  string title = 2;
  string description = 3;
  repeated WidgetConfig widgets = 4;
  PageLayout layout = 5;
  PageStyle style = 6;
}

message PageLayout {
  LayoutType type = 1;
  int32 columns = 2;                // For grid layout
  int32 gap = 3;                    // Gap between widgets
}

enum LayoutType {
  LAYOUT_TYPE_UNSPECIFIED = 0;
  FLEX_COLUMN = 1;
  FLEX_ROW = 2;
  GRID = 3;
  ABSOLUTE = 4;
}

message PageStyle {
  string background = 1;
  string text_color = 2;
  string font_family = 3;
}
